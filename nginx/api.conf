# /etc/nginx/conf.d/api.conf
#
# Nginx reverse proxy for Fastify API
# OpenSUSE: config lives in /etc/nginx/conf.d/
#
# Assumptions:
#   - Domain:          api.yourdomain.com
#   - TLS cert:        /etc/ssl/certs/api.yourdomain.com.pem
#   - TLS key:         /etc/ssl/private/api.yourdomain.com.key
#   - Fastify port:    3000
#   - Upload endpoint: /upload  (tighten or change as needed)

# ── Upstream ──────────────────────────────────────────────────────────────────
#
# keepalive 64 keeps a pool of idle connections to Fastify, avoiding the cost
# of a new TCP handshake on every proxied request.

upstream fastify {
    server 127.0.0.1:3000;
    keepalive 64;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────

server {
    listen 80;
    server_name api.yourdomain.com;

    # ACME challenge passthrough for certbot / Let's Encrypt renewal
    location /.well-known/acme-challenge/ {
        root /var/www/acme;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server ──────────────────────────────────────────────────────────────

server {
    listen 443 ssl;
    http2 on;
    server_name api.yourdomain.com;

    # ── TLS ───────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/ssl/certs/api.yourdomain.com.pem;
    ssl_certificate_key /etc/ssl/private/api.yourdomain.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options    nosniff always;
    add_header X-Frame-Options           DENY    always;

    # ── Global defaults (non-upload endpoints) ────────────────────────────────
    client_max_body_size  10m;
    client_body_timeout   30s;
    client_body_buffer_size 128k;

    # Timeouts for regular requests
    proxy_connect_timeout 10s;
    proxy_read_timeout    30s;
    proxy_send_timeout    30s;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    # Define zones in /etc/nginx/nginx.conf (http block):
    #   limit_req_zone  $binary_remote_addr zone=api:10m    rate=60r/m;
    #   limit_req_zone  $binary_remote_addr zone=upload:10m rate=5r/m;
    #   limit_conn_zone $binary_remote_addr zone=perip:10m;
    #
    # Uncomment once zones are declared:
    # limit_req  zone=api    burst=20 nodelay;
    # limit_conn zone=perip  20;

    # ── Upload endpoint ───────────────────────────────────────────────────────
    location /upload {
        # 150 MB cap — slightly above the 125 MB you expect, so Nginx rejects
        # anything clearly oversized before it reaches Fastify.
        client_max_body_size  150m;

        # How long to wait between successive read operations from the client.
        # NOT the total transfer time. A 125 MB file at 1 Mbps takes ~1000s,
        # but individual reads are much faster — 60s is generous.
        client_body_timeout   120s;

        # CRITICAL for large streaming uploads: with proxy_request_buffering off,
        # Nginx forwards the request body to Fastify as it arrives instead of
        # spooling the whole 125 MB to disk first. This means:
        #   - Lower latency (Fastify starts processing immediately)
        #   - No disk I/O on the Nginx side for the body
        #   - Fastify must be able to handle slow clients (it can)
        proxy_request_buffering off;

        # Must be HTTP/1.1 for keepalive to work and for chunked encoding
        proxy_http_version 1.1;

        # Clear the Connection header so keepalive works through the proxy
        proxy_set_header Connection "";

        # Give Fastify time to process and respond to a large upload
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        proxy_pass         http://fastify;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Rate-limit uploads more aggressively (uncomment once zone is declared)
        # limit_req zone=upload burst=3 nodelay;
    }

    # ── General API proxy ─────────────────────────────────────────────────────
    location / {
        proxy_pass         http://fastify;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Enable gzip for JSON responses (not useful for uploads)
        gzip            on;
        gzip_types      application/json text/plain;
        gzip_min_length 1024;
    }

    # ── SSE / long-polling endpoints ──────────────────────────────────────────
    # If you're using Server-Sent Events (from the previous demo!), you need:
    #   - proxy_buffering off  (so chunks reach the client immediately)
    #   - long read timeout    (connection stays open for minutes/hours)
    location /events {
        proxy_pass             http://fastify;
        proxy_http_version     1.1;
        proxy_set_header       Connection        "";
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     3600s;
        proxy_send_timeout     3600s;
        keepalive_timeout      3600s;
    }

    # ── Logs ──────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/api_access.log combined;
    error_log  /var/log/nginx/api_error.log  warn;
}
